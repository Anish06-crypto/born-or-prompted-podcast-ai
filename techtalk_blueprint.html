<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #0a1628; }
  svg#main { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<svg id="main" viewBox="0 0 960 540" preserveAspectRatio="xMidYMid meet"
     xmlns="http://www.w3.org/2000/svg">

  <!-- Background -->
  <rect width="960" height="540" fill="#0d1f3c"/>

  <!-- Grid -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none"
            stroke="rgba(100,160,255,0.07)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="960" height="540" fill="url(#grid)"/>

  <!-- Border -->
  <rect width="960" height="540" fill="none"
        stroke="rgba(100,160,255,0.18)" stroke-width="1"/>

  <!-- Top title -->
  <text x="480" y="38" text-anchor="middle"
        fill="rgba(255,255,255,0.12)" font-family="Courier New,monospace"
        font-size="9" letter-spacing="5">TECHTALK · SYSTEM DIAGRAM</text>

  <!-- ─────────────────────────────────────────────
       CONNECTION LINES (Lyra ↔ Topic ↔ Cipher)
  ───────────────────────────────────────────── -->
  <!-- Lyra → Topic -->
  <line x1="248" y1="240" x2="374" y2="240"
        stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="7 4"/>
  <polygon points="370,234 386,240 370,246" fill="rgba(255,255,255,0.55)"/>

  <!-- Topic → Cipher -->
  <line x1="586" y1="240" x2="712" y2="240"
        stroke="rgba(255,255,255,0.3)" stroke-width="1.5" stroke-dasharray="7 4"/>
  <polygon points="590,234 574,240 590,246" fill="rgba(255,255,255,0.55)"/>

  <!-- ─────────────────────────────────────────────
       LYRA  (centred x=148)
  ───────────────────────────────────────────── -->

  <!-- Headphone arc -->
  <path d="M 112,124 A 36,36 0 0 1 184,124"
        fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Earcup L -->
  <rect x="102" y="120" width="14" height="20" rx="3"
        fill="none" stroke="white" stroke-width="2.2"/>
  <!-- Earcup R -->
  <rect x="184" y="120" width="14" height="20" rx="3"
        fill="none" stroke="white" stroke-width="2.2"/>
  <!-- Head -->
  <circle cx="148" cy="152" r="22"
          fill="none" stroke="white" stroke-width="2.5"/>
  <!-- Body -->
  <path d="M 108,220 Q 108,182 148,182 Q 188,182 188,220"
        fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="108" y1="220" x2="188" y2="220"
        stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Mic -->
  <rect x="140" y="232" width="16" height="24" rx="8"
        fill="none" stroke="white" stroke-width="2.2"/>
  <line x1="148" y1="256" x2="148" y2="272"
        stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="133" y1="272" x2="163" y2="272"
        stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Name -->
  <text x="148" y="304" text-anchor="middle"
        fill="white" font-family="Courier New,monospace"
        font-size="17" font-weight="700" letter-spacing="4">LYRA</text>

  <!-- Tag: WARM -->
  <rect x="109" y="314" width="78" height="18" rx="2"
        fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
  <text x="148" y="327" text-anchor="middle"
        fill="rgba(255,255,255,0.55)" font-family="Courier New,monospace"
        font-size="8.5" letter-spacing="1.5">WARM</text>

  <!-- Tag: OPTIMISTIC -->
  <rect x="92" y="337" width="112" height="18" rx="2"
        fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
  <text x="148" y="350" text-anchor="middle"
        fill="rgba(255,255,255,0.55)" font-family="Courier New,monospace"
        font-size="8.5" letter-spacing="1.5">OPTIMISTIC</text>

  <!-- Memory -->
  <circle cx="148" cy="380" r="7"
          fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.8"/>
  <circle cx="148" cy="380" r="2.5" fill="rgba(255,255,255,0.7)"/>
  <line x1="156" y1="380" x2="200" y2="380"
        stroke="rgba(255,255,255,0.18)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="148" y="400" text-anchor="middle"
        fill="rgba(255,255,255,0.35)" font-family="Courier New,monospace"
        font-size="8" letter-spacing="1.5">MEMORY</text>

  <!-- ─────────────────────────────────────────────
       CIPHER  (centred x=812)
  ───────────────────────────────────────────── -->

  <!-- Headphone arc -->
  <path d="M 776,124 A 36,36 0 0 1 848,124"
        fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Earcup L -->
  <rect x="766" y="120" width="14" height="20" rx="3"
        fill="none" stroke="white" stroke-width="2.2"/>
  <!-- Earcup R -->
  <rect x="848" y="120" width="14" height="20" rx="3"
        fill="none" stroke="white" stroke-width="2.2"/>
  <!-- Head -->
  <circle cx="812" cy="152" r="22"
          fill="none" stroke="white" stroke-width="2.5"/>
  <!-- Body -->
  <path d="M 772,220 Q 772,182 812,182 Q 852,182 852,220"
        fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="772" y1="220" x2="852" y2="220"
        stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Mic -->
  <rect x="804" y="232" width="16" height="24" rx="8"
        fill="none" stroke="white" stroke-width="2.2"/>
  <line x1="812" y1="256" x2="812" y2="272"
        stroke="white" stroke-width="2.2" stroke-linecap="round"/>
  <line x1="797" y1="272" x2="827" y2="272"
        stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Name -->
  <text x="812" y="304" text-anchor="middle"
        fill="white" font-family="Courier New,monospace"
        font-size="17" font-weight="700" letter-spacing="4">CIPHER</text>

  <!-- Tag: SHARP -->
  <rect x="773" y="314" width="78" height="18" rx="2"
        fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
  <text x="812" y="327" text-anchor="middle"
        fill="rgba(255,255,255,0.55)" font-family="Courier New,monospace"
        font-size="8.5" letter-spacing="1.5">SHARP</text>

  <!-- Tag: CONTRARIAN -->
  <rect x="757" y="337" width="110" height="18" rx="2"
        fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1"/>
  <text x="812" y="350" text-anchor="middle"
        fill="rgba(255,255,255,0.55)" font-family="Courier New,monospace"
        font-size="8.5" letter-spacing="1.5">CONTRARIAN</text>

  <!-- Memory -->
  <circle cx="812" cy="380" r="7"
          fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1.8"/>
  <circle cx="812" cy="380" r="2.5" fill="rgba(255,255,255,0.7)"/>
  <line x1="760" y1="380" x2="804" y2="380"
        stroke="rgba(255,255,255,0.18)" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="812" y="400" text-anchor="middle"
        fill="rgba(255,255,255,0.35)" font-family="Courier New,monospace"
        font-size="8" letter-spacing="1.5">MEMORY</text>

  <!-- ─────────────────────────────────────────────
       CENTRE — Topic card + waveform
  ───────────────────────────────────────────── -->

  <!-- Topic card -->
  <rect x="388" y="210" width="184" height="60" rx="4"
        fill="rgba(255,255,255,0.04)"
        stroke="rgba(255,255,255,0.45)" stroke-width="1.5"/>
  <text x="480" y="230" text-anchor="middle"
        fill="rgba(255,255,255,0.32)" font-family="Courier New,monospace"
        font-size="8" letter-spacing="2.5">EPISODE</text>
  <text x="480" y="255" text-anchor="middle"
        fill="white" font-family="Courier New,monospace"
        font-size="15" font-weight="700" letter-spacing="5">TOPIC</text>

  <!-- Waveform -->
  <line x1="290" y1="310" x2="388" y2="310"
        stroke="rgba(255,255,255,0.28)" stroke-width="1.5"/>
  <polyline
    points="388,310 396,310 402,293 408,327 414,296 420,324 426,308 432,320
            438,295 444,325 450,307 456,322 462,291 468,329 474,310 482,310 572,310"
    fill="none" stroke="white" stroke-width="1.8"
    stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="572" y1="310" x2="670" y2="310"
        stroke="rgba(255,255,255,0.28)" stroke-width="1.5"/>

  <!-- ─────────────────────────────────────────────
       CORNER LABELS
  ───────────────────────────────────────────── -->
  <text x="22" y="526" fill="rgba(255,255,255,0.18)"
        font-family="Courier New,monospace" font-size="8.5" letter-spacing="2">
    TECHTALK · AI PODCAST
  </text>
  <text x="938" y="526" text-anchor="end"
        fill="rgba(255,255,255,0.18)" font-family="Courier New,monospace"
        font-size="8.5" letter-spacing="2">V3.0</text>

</svg>
</body>
</html>
